<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KODAI – Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;
  --card:#1a1d27;
  --card2:#22263a;
  --border:rgba(255,255,255,.08);
  --purple:#9B5DE5;
  --green:#2EC486;
  --yellow:#FFD93D;
  --orange:#FF6B35;
  --red:#FF4D8B;
  --blue:#4DABF7;
  --teal:#00D4AA;
  --text:rgba(255,255,255,.9);
  --sub:rgba(255,255,255,.5);

  /* World colors */
  --w1:#43C6AC; --w1d:#2a8a78;
  --w2:#4DABF7; --w2d:#2a7ab5;
  --w3:#f7971e; --w3d:#b56e10;
  --w4:#9B5DE5; --w4d:#6a3fa0;
  --w5:#FF4D8B; --w5d:#b53360;
  --w6:#FFD93D; --w6d:#c4a300;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;min-height:100vh;}

/* ===== NAV ===== */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(15,17,23,.95);backdrop-filter:blur(12px);
  border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:8px;padding:0 28px;height:64px;
}
/* .nav-logo{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--green);text-decoration:none;margin-right:auto;}
.nav-links{display:flex;gap:4px;}
.nav-link{padding:8px 14px;border-radius:10px;color:var(--sub);text-decoration:none;font-size:.88rem;transition:all .2s;}
.nav-link:hover,.nav-link.active{background:rgba(255,255,255,.08);color:var(--text);}
.nav-cta{background:var(--purple);color:white;padding:9px 18px;border-radius:12px;text-decoration:none;font-size:.88rem;transition:all .2s;white-space:nowrap;}
.nav-cta:hover{background:#7b3fc4;} */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;}
.hamburger span{width:22px;height:2px;background:var(--text);border-radius:2px;}
.mobile-menu{display:none;flex-direction:column;gap:4px;padding:12px 16px;background:rgba(15,17,23,.98);border-bottom:2px solid var(--border);}
@media(max-width:700px){
  .nav-links,.nav-cta{display:none;}
  .hamburger{display:flex;}
  .mobile-menu.open{display:flex;}
}

/* ===== TOP BAR ===== */
.top-bar{
  max-width:780px;margin:24px auto 0;padding:0 20px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
}
.xp-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:2px solid rgba(255,217,61,.3);
  border-radius:50px;padding:8px 18px;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--yellow);
}
.streak-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:2px solid rgba(255,107,53,.3);
  border-radius:50px;padding:8px 18px;
  font-family:'Fredoka One',cursive;font-size:1rem;color:var(--orange);
}
.reset-btn{
  margin-left:auto;padding:7px 14px;background:rgba(255,77,139,.1);
  border:2px solid rgba(255,77,139,.3);border-radius:10px;
  color:var(--red);font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;transition:all .2s;
}
.reset-btn:hover{background:rgba(255,77,139,.2);}

/* ===== WORLD MAP ===== */
.world-map{max-width:780px;margin:0 auto;padding:28px 20px 80px;}

.world-section{margin-bottom:48px;}
.world-banner{
  border-radius:20px;padding:20px 24px;margin-bottom:32px;
  display:flex;align-items:center;gap:16px;
  border:3px solid rgba(255,255,255,.12);
  position:relative;overflow:hidden;
}
.world-banner::before{content:'';position:absolute;inset:0;opacity:.12;background:repeating-linear-gradient(45deg,rgba(255,255,255,.1) 0,rgba(255,255,255,.1) 1px,transparent 1px,transparent 12px);}
.world-num{font-family:'Fredoka One',cursive;font-size:2rem;opacity:.4;}
.world-info{}
.world-label{font-size:.72rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.7;margin-bottom:2px;}
.world-name{font-family:'Fredoka One',cursive;font-size:1.5rem;}
.world-sub{font-size:.82rem;opacity:.7;margin-top:2px;}

/* ===== LEVEL PATH ===== */
.level-path{display:flex;flex-direction:column;align-items:center;gap:0;}
.level-row{
  display:flex;align-items:center;justify-content:center;
  width:100%;position:relative;
  margin-bottom:8px;
}
/* zigzag: odd rows push right, even push left */
.level-row:nth-child(odd){padding-right:120px;}
.level-row:nth-child(even){padding-left:120px;}

.level-connector{
  position:absolute;top:50%;
  width:64px;height:4px;
  border-radius:4px;
  opacity:.35;
}

.level-bubble{
  width:72px;height:72px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  border:4px solid rgba(255,255,255,.15);
  transition:transform .15s,box-shadow .15s;
  user-select:none;
  flex-shrink:0;
}
.level-bubble:hover:not(.locked){transform:scale(1.1);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.level-bubble.locked{opacity:.35;cursor:not-allowed;filter:grayscale(.6);}
.level-bubble.current{animation:pulse-ring 2s infinite;}
.level-bubble.boss{width:88px;height:88px;border-width:5px;}
.bubble-emoji{font-size:1.5rem;line-height:1;}
.bubble-num{font-family:'Fredoka One',cursive;font-size:.75rem;margin-top:2px;}
.lock-icon{position:absolute;bottom:-4px;right:-4px;font-size:.9rem;}
.check-icon{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:.7rem;border:3px solid var(--bg);}
.star-ring{position:absolute;inset:-6px;border-radius:50%;border:3px dashed var(--yellow);animation:spin 8s linear infinite;opacity:.5;}

@keyframes pulse-ring{
  0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4);}
  50%{box-shadow:0 0 0 12px rgba(255,255,255,0);}
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ===== GAME MODAL ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:200;display:flex;align-items:center;justify-content:center;
  padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{
  background:var(--card);border-radius:28px;
  border:2px solid var(--border);
  width:100%;max-width:640px;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(20px);transition:transform .2s;
}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-head{
  padding:20px 24px 16px;border-bottom:2px solid var(--border);
  display:flex;align-items:center;gap:14px;flex-shrink:0;
}
.modal-world-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.modal-head-info{flex:1;}
.modal-head-title{font-family:'Fredoka One',cursive;font-size:1.2rem;}
.modal-head-sub{font-size:.78rem;color:var(--sub);margin-top:2px;}
.modal-close{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:none;color:var(--sub);cursor:pointer;font-size:1rem;transition:all .2s;}
.modal-close:hover{background:rgba(255,255,255,.08);color:var(--text);}
.modal-body{flex:1;overflow-y:auto;padding:24px;}

/* ===== GAME SHARED ===== */
.game-q{font-size:1rem;font-weight:800;color:var(--text);margin-bottom:16px;line-height:1.5;}
.game-score-row{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;}
.score-chip{background:var(--card2);border:2px solid var(--border);border-radius:50px;padding:5px 14px;font-family:'Fredoka One',cursive;font-size:.88rem;}
.btn-primary{
  background:var(--purple);color:white;border:none;
  border-radius:12px;padding:12px 24px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 0 #6a3fa0;
}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:active{transform:translateY(2px);box-shadow:none;}
.btn-secondary{
  background:var(--card2);color:var(--text);border:2px solid var(--border);
  border-radius:12px;padding:12px 20px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;
  cursor:pointer;transition:all .2s;
}
.btn-secondary:hover{border-color:rgba(255,255,255,.3);}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
.feedback{
  margin-top:14px;padding:12px 16px;border-radius:12px;
  font-size:.9rem;font-weight:800;min-height:20px;
  display:none;
}
.feedback.ok{background:rgba(46,196,134,.15);border:2px solid rgba(46,196,134,.4);color:var(--green);display:block;}
.feedback.err{background:rgba(255,77,139,.15);border:2px solid rgba(255,77,139,.4);color:var(--red);display:block;animation:shake .3s;}

/* ===== GAME: MULTIPLE CHOICE ===== */
.mc-options{display:flex;flex-direction:column;gap:10px;}
.mc-opt{
  padding:14px 18px;border:3px solid var(--border);border-radius:14px;
  background:var(--card2);cursor:pointer;transition:all .2s;
  font-size:.92rem;font-weight:800;
}
.mc-opt:hover:not(.disabled){border-color:var(--purple);background:rgba(155,93,229,.1);}
.mc-opt.correct{border-color:var(--green);background:rgba(46,196,134,.15);color:var(--green);}
.mc-opt.wrong{border-color:var(--red);background:rgba(255,77,139,.15);color:var(--red);}
.mc-opt.disabled{cursor:not-allowed;opacity:.6;}

/* ===== GAME: DRAG & DROP SORT ===== */
.sort-list{display:flex;flex-direction:column;gap:8px;}
.sort-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border:2px solid var(--border);border-radius:12px;
  background:var(--card2);cursor:grab;transition:all .2s;
  user-select:none;
}
.sort-item:active{cursor:grabbing;opacity:.7;}
.sort-item.drag-over{border-color:var(--yellow);background:rgba(255,217,61,.08);}
.sort-handle{color:var(--sub);font-size:1.1rem;}
.sort-num{
  width:28px;height:28px;border-radius:50%;
  background:var(--purple);color:white;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:.85rem;flex-shrink:0;
}
.sort-text{flex:1;font-size:.88rem;}
.sort-arrows{display:flex;flex-direction:column;gap:2px;}
.sort-arr{background:rgba(255,255,255,.1);border:none;border-radius:4px;color:white;cursor:pointer;padding:2px 8px;font-size:.7rem;transition:background .15s;}
.sort-arr:hover{background:rgba(255,255,255,.25);}

/* ===== GAME: GRID / MAP ===== */
.grid-game{display:flex;gap:20px;flex-wrap:wrap;}
.grid-board{
  display:grid;border-radius:12px;overflow:hidden;
  border:2px solid var(--border);flex-shrink:0;
}
.grid-cell{
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;border:1px solid rgba(255,255,255,.05);
  transition:background .2s;
}
.cell-empty{background:var(--card2);}
.cell-wall{background:#374151;}
.cell-start{background:rgba(46,196,134,.2);}
.cell-goal{background:rgba(255,217,61,.2);}
.cell-kodi{background:rgba(155,93,229,.3);}
.grid-controls{display:flex;flex-direction:column;gap:8px;}
.dir-pad{display:grid;grid-template-columns:repeat(3,44px);gap:4px;}
.dir-btn{
  width:44px;height:44px;border-radius:10px;border:2px solid var(--border);
  background:var(--card2);color:var(--text);cursor:pointer;font-size:1.1rem;
  transition:all .15s;display:flex;align-items:center;justify-content:center;
}
.dir-btn:hover{background:rgba(155,93,229,.3);border-color:var(--purple);}
.code-seq{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;
  min-height:40px;padding:8px;background:var(--card2);
  border:2px dashed var(--border);border-radius:10px;
}
.code-block{
  padding:4px 10px;border-radius:8px;font-size:.78rem;font-weight:800;
  color:white;cursor:pointer;
}
.code-block:hover{opacity:.7;}

/* ===== GAME: PATTERN ===== */
.pattern-seq{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center;}
.pat-item{
  width:52px;height:52px;border-radius:12px;border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:1.4rem;
}
.pat-blank{border-style:dashed;border-color:var(--yellow);background:rgba(255,217,61,.05);}
.pat-choices{display:flex;gap:10px;flex-wrap:wrap;}
.pat-choice{
  width:56px;height:56px;border-radius:12px;border:3px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;
  cursor:pointer;transition:all .2s;background:var(--card2);
}
.pat-choice:hover{border-color:var(--yellow);transform:scale(1.05);}
.pat-choice.correct{border-color:var(--green);background:rgba(46,196,134,.15);}
.pat-choice.wrong{border-color:var(--red);background:rgba(255,77,139,.15);animation:shake .3s;}

/* ===== GAME: MATCH ===== */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-col{display:flex;flex-direction:column;gap:8px;}
.match-item{
  padding:12px 14px;border:3px solid var(--border);border-radius:12px;
  background:var(--card2);cursor:pointer;transition:all .2s;font-size:.88rem;text-align:center;
}
.match-item:hover{border-color:var(--yellow);}
.match-item.selected-a{border-color:var(--purple);background:rgba(155,93,229,.15);}
.match-item.selected-b{border-color:var(--blue);background:rgba(77,171,247,.15);}
.match-item.matched{border-color:var(--green);background:rgba(46,196,134,.15);cursor:default;opacity:.7;}
.match-item.wrong-flash{border-color:var(--red);animation:shake .3s;}

/* ===== WIN OVERLAY ===== */
.win-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.win-overlay.open{opacity:1;pointer-events:all;}
.win-card{
  background:var(--card);border-radius:28px;border:3px solid var(--green);
  padding:40px 48px;text-align:center;max-width:380px;width:100%;
  transform:scale(.8);transition:transform .3s;
}
.win-overlay.open .win-card{transform:scale(1);}
.win-emoji{font-size:3.5rem;margin-bottom:12px;}
.win-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--yellow);}
.win-xp{font-size:1.1rem;color:var(--green);margin-top:8px;font-weight:800;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:299;}
.confetti-piece{
  position:absolute;top:-10px;width:10px;height:14px;border-radius:3px;
  animation:confetti-fall 2.5s ease-in forwards;
}
@keyframes confetti-fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:0;}
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ===== TOAST ===== */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--card2);border:2px solid var(--border);border-radius:12px;
  padding:12px 18px;font-size:.88rem;font-weight:800;
  animation:slide-in .3s ease;max-width:280px;
}
.toast.success{border-color:rgba(46,196,134,.5);color:var(--green);}
.toast.error{border-color:rgba(255,77,139,.5);color:var(--red);}
@keyframes slide-in{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* ===== KODI CHAT ===== */
.kodi-fab{
  position:fixed;bottom:28px;right:28px;z-index:150;
  width:56px;height:56px;border-radius:50%;
  background:var(--purple);border:3px solid rgba(155,93,229,.4);
  font-size:1.5rem;cursor:pointer;transition:transform .2s;
  box-shadow:0 8px 24px rgba(155,93,229,.4);
}
.kodi-fab:hover{transform:scale(1.1);}

@media(max-width:600px){
  .level-row:nth-child(odd){padding-right:60px;}
  .level-row:nth-child(even){padding-left:60px;}
  .level-bubble{width:60px;height:60px;}
  .level-bubble.boss{width:72px;height:72px;}
  .bubble-emoji{font-size:1.2rem;}
  .grid-cell{width:42px;height:42px;}
  .modal-box{max-height:95vh;}
  .modal-body{padding:16px;}
}
</style>
</head>

      <button class="btn-primary" onclick="closeWin();nextLevel();">▶ Lanjut!</button>

<script>
// ===== LEVEL DATA =====
const WORLDS = [
  {
    id:1, name:'Dunia Perintah', emoji:'🌿', color:'--w1', colorHex:'#43C6AC',
    desc:'Instruksi, urutan, dan pola dasar',
    levels:[
      {id:1, emoji:'🤖', label:'Instruksi', xp:50, boss:false, game:'mc',
       title:'Mengenal Instruksi',
       concept:'Sequence — Instruksi Tunggal',
       data:{
         rounds:[
           {q:'Kodi berdiri diam. Bintang ⭐ ada tepat di DEPAN Kodi. Instruksi mana yang benar?',
            opts:['⬆ MAJU','⬇ MUNDUR','⬅ KIRI','➡ KANAN'], ans:0,
            explain:'Bintang ada di depan, jadi Kodi harus MAJU! Komputer hanya melakukan tepat seperti yang diperintahkan.'},
           {q:'Kodi menghadap ke atas. Bintang ⭐ ada di sebelah KANAN Kodi. Pilih instruksi yang tepat!',
            opts:['⬆ MAJU','⬇ MUNDUR','⬅ KIRI','➡ KANAN'], ans:3,
            explain:'Bintang ada di kanan, jadi instruksinya KANAN. Instruksi harus spesifik!'},
           {q:'Kodi perlu mundur satu langkah untuk menghindari rintangan. Instruksi apa yang digunakan?',
            opts:['⬆ MAJU','⬇ MUNDUR','⬅ KIRI','➡ KANAN'], ans:1,
            explain:'Untuk bergerak ke belakang, gunakan MUNDUR. Setiap instruksi punya arti yang jelas!'},
         ]
       }
      },
      {id:2, emoji:'⏰', label:'Urutan Pagi', xp:60, boss:false, game:'sort',
       title:'Urutan Kegiatan Pagi',

// ===== STATE =====
let progress = JSON.parse(localStorage.getItem('kodai_progress') || '{}');
let totalXP = parseInt(localStorage.getItem('kodai_xp') || '0');
let streak = parseInt(localStorage.getItem('kodai_streak') || '0');
let currentLevelId = null;
let currentRound = 0;
let roundScore = 0;
let winPending = null;

function saveProgress(){
  localStorage.setItem('kodai_progress', JSON.stringify(progress));
  localStorage.setItem('kodai_xp', totalXP);
  localStorage.setItem('kodai_streak', streak);
}
function resetProgress(){
  progress = {};
  totalXP = 0;
  streak = 0;
  saveProgress();
  document.getElementById('totalXP').textContent = 0;
  document.getElementById('streakCount').textContent = 0;
  renderMap();
  showToast('🔄 Progress direset!','');
}

function isUnlocked(levelId){
  if(levelId === 1) return true;
  return !!progress[levelId - 1];
}
function isCompleted(lv){ return !!progress[lv.id]; }

// ===== RENDER MAP =====
function renderMap(){
  const container = document.getElementById('worldMap');
  container.innerHTML = '';
  WORLDS.forEach(w => {
    const section = document.createElement('div');
    section.className = 'world-section';

    // Banner
    const banner = document.createElement('div');
    banner.className = 'world-banner';
    banner.style.background = `linear-gradient(135deg, ${w.colorHex}22, ${w.colorHex}11)`;
    banner.style.borderColor = `${w.colorHex}44`;
    banner.innerHTML = `
      <div class="world-num">${w.id}</div>
      <div class="world-info">
        <div class="world-label" style="color:${w.colorHex}">Dunia ${w.id}</div>
        <div class="world-name">${w.emoji} ${w.name}</div>
        <div class="world-sub">${w.desc}</div>
      </div>
    `;
    section.appendChild(banner);

    // Level path
    const path = document.createElement('div');
    path.className = 'level-path';

    w.levels.forEach((lv, i) => {
      const row = document.createElement('div');
      row.className = 'level-row';

      const completed = isCompleted(lv);
      const unlocked = isUnlocked(lv.id);
      const isCurrent = unlocked && !completed;

      const bubble = document.createElement('div');
      bubble.className = `level-bubble${lv.boss?' boss':''}${completed?' completed':isCurrent?' current':!unlocked?' locked':''}`;
      bubble.style.background = completed
        ? `linear-gradient(135deg, ${w.colorHex}, ${w.colorHex}bb)`
        : unlocked
        ? `linear-gradient(135deg, ${w.colorHex}cc, ${w.colorHex}88)`
        : '#2a2d3a';
      bubble.style.borderColor = completed ? w.colorHex : unlocked ? `${w.colorHex}66` : 'rgba(255,255,255,.1)';

      if(lv.boss){ bubble.innerHTML += `<div class="star-ring"></div>`; }

      bubble.innerHTML += `
        <div class="bubble-emoji">${lv.emoji}</div>
        <div class="bubble-num" style="color:${completed?'white':unlocked?'rgba(255,255,255,.9)':'rgba(255,255,255,.3)'}">${lv.id}</div>
        ${completed ? '<div class="check-icon">✓</div>' : !unlocked ? '<div class="lock-icon">🔒</div>' : ''}
      `;

      if(unlocked){
        bubble.onclick = () => openLevel(lv, w);
        bubble.title = lv.title;
      }
      row.appendChild(bubble);
      path.appendChild(row);
    });

    section.appendChild(path);
    container.appendChild(section);
  });

  document.getElementById('totalXP').textContent = totalXP;
  document.getElementById('streakCount').textContent = streak;
}

// ===== OPEN LEVEL =====
function openLevel(lv, w){
  currentLevelId = lv.id;
  currentRound = 0;
  roundScore = 0;
  winPending = {lv, w};

  document.getElementById('modalDot').style.background = w.colorHex;
  document.getElementById('modalTitle').textContent = `${lv.emoji} ${lv.title}`;
  document.getElementById('modalSub').textContent = lv.concept;

  const body = document.getElementById('modalBody');
  body.innerHTML = '';

  if(lv.game === 'mc') renderMC(lv, body);
  else if(lv.game === 'sort') renderSort(lv, body);
  else if(lv.game === 'pattern') renderPattern(lv, body);
  else if(lv.game === 'match') renderMatch(lv, body);
  else if(lv.game === 'maze') renderMaze(lv, body);
  else if(lv.game === 'capstone') renderCapstone(lv, body);

  document.getElementById('gameModal').classList.add('open');
}

function closeModal(e){
  if(e.target === document.getElementById('gameModal'))
    document.getElementById('gameModal').classList.remove('open');
}

// ===== GAME: MULTIPLE CHOICE =====
function renderMC(lv, body){
  const rounds = lv.data.rounds;
  let ci = 0;
  function showRound(){
    const r = rounds[ci];
    body.innerHTML = `
      <div class="game-score-row">
        <div class="score-chip">📝 Soal <span id="mc-ci">${ci+1}</span>/${rounds.length}</div>
        <div class="score-chip">⭐ Benar: <span id="mc-score">0</span></div>
      </div>
      <div class="game-q" style="white-space:pre-wrap">${r.q}</div>
      <div class="mc-options" id="mc-opts"></div>
      <div class="feedback" id="mc-fb"></div>
    `;
    const opts = document.getElementById('mc-opts');
    r.opts.forEach((o,i) => {
      const btn = document.createElement('div');
      btn.className = 'mc-opt';
      btn.textContent = o;
      btn.onclick = () => answerMC(i, r, btn, opts, lv, rounds);
      opts.appendChild(btn);
    });
  }

  let correct = 0;
  function answerMC(i, r, btn, opts, lv, rounds){
    opts.querySelectorAll('.mc-opt').forEach(b => b.classList.add('disabled'));
    if(i === r.ans){ btn.classList.add('correct'); correct++; }
    else {
      btn.classList.add('wrong');
      opts.querySelectorAll('.mc-opt')[r.ans].classList.add('correct');
    }
    const fb = document.getElementById('mc-fb');
    fb.className = 'feedback ' + (i===r.ans?'ok':'err');
    fb.textContent = (i===r.ans?'✅ ':'❌ ') + r.explain;

    document.getElementById('mc-score').textContent = correct;

    setTimeout(() => {
      ci++;
      if(ci < rounds.length) showRound();
      else finishGame(lv, correct, rounds.length, body);
    }, 1800);
  }
  showRound();
}

// ===== GAME: SORT =====
function renderSort(lv, body){
  const orig = [...lv.data.items];
  let arr = shuffleArray([...orig]);

  function render(){
    body.innerHTML = `
      <div class="game-q">${lv.data.hint || 'Susun langkah-langkah berikut ke urutan yang benar!'}</div>
      <div class="sort-list" id="sortList"></div>
      <div class="feedback" id="sort-fb"></div>
      <div class="btn-row">
        <button class="btn-primary" onclick="checkSort()">✅ Cek Urutan!</button>
        <button class="btn-secondary" onclick="shuffleSort()">🔀 Acak Ulang</button>
      </div>
    `;
    const list = document.getElementById('sortList');
    arr.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'sort-item';
      el.draggable = true;
      el.dataset.idx = i;
      el.innerHTML = `
        <span class="sort-handle">⠿</span>
        <div class="sort-num">${i+1}</div>
        <div class="sort-text">${item}</div>
        <div class="sort-arrows">
          <button class="sort-arr" onclick="moveSort(${i},-1)">▲</button>
          <button class="sort-arr" onclick="moveSort(${i},1)">▼</button>
        </div>
      `;
      // Drag events
      el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', i); el.style.opacity='.5'; });
      el.addEventListener('dragend', () => { el.style.opacity='1'; });
      el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
      el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
      el.addEventListener('drop', e => {
        e.preventDefault(); el.classList.remove('drag-over');
        const from = parseInt(e.dataTransfer.getData('text/plain'));
        const to = parseInt(el.dataset.idx);
        [arr[from], arr[to]] = [arr[to], arr[from]];
        render();
      });
      list.appendChild(el);
    });
  }

  window.moveSort = (i, dir) => {
    const j = i + dir;
    if(j < 0 || j >= arr.length) return;
    [arr[i], arr[j]] = [arr[j], arr[i]];
    render();
  };

  window.shuffleSort = () => { arr = shuffleArray([...orig]); render(); };

  window.checkSort = () => {
    const correct = lv.data.correct;
    const isRight = arr.every((item, i) => item === orig[correct[i]]);
    const fb = document.getElementById('sort-fb');
    if(isRight){
      fb.className = 'feedback ok';
      fb.textContent = '✅ Urutan sudah benar! Luar biasa!';
      setTimeout(() => finishGame(lv, 1, 1, body), 1200);
    } else {
      fb.className = 'feedback err';
      fb.textContent = '❌ Ada yang kurang tepat. Coba periksa lagi!';
    }
  };

  render();
}

// ===== GAME: PATTERN =====
function renderPattern(lv, body){
  const rounds = lv.data.rounds;
  let ci = 0, correct = 0;

  function showRound(){
    const r = rounds[ci];
    body.innerHTML = `
      <div class="game-score-row">
        <div class="score-chip">🌈 Soal ${ci+1}/${rounds.length}</div>
        <div class="score-chip">⭐ Benar: ${correct}</div>
      </div>
      <div class="game-q">Lanjutkan pola berikut:</div>
      <div class="pattern-seq" id="patSeq"></div>
      <div style="color:var(--sub);font-size:.85rem;margin-bottom:14px;">Pilih jawaban yang tepat:</div>
      <div class="pat-choices" id="patChoices"></div>
      <div class="feedback" id="pat-fb"></div>
    `;
    const seq = document.getElementById('patSeq');
    r.seq.forEach(s => {
      const el = document.createElement('div');
      el.className = s === '?' ? 'pat-item pat-blank' : 'pat-item';
      el.textContent = s === '?' ? '?' : s;
      seq.appendChild(el);
    });
    const choices = document.getElementById('patChoices');
    r.choices.forEach(c => {
      const el = document.createElement('div');
      el.className = 'pat-choice';
      el.textContent = c;
      el.onclick = () => {
        choices.querySelectorAll('.pat-choice').forEach(x => x.style.pointerEvents='none');
        const ok = c === r.ans;
        el.classList.add(ok ? 'correct' : 'wrong');
        if(!ok) choices.querySelectorAll('.pat-choice')[r.choices.indexOf(r.ans)].classList.add('correct');
        const fb = document.getElementById('pat-fb');
        fb.className = 'feedback ' + (ok?'ok':'err');
        fb.textContent = (ok?'✅ ':'❌ ') + r.rule;
        if(ok) correct++;
        setTimeout(() => {
          ci++;
          if(ci < rounds.length) showRound();
          else finishGame(lv, correct, rounds.length, body);
        }, 1500);
      };
      choices.appendChild(el);
    });
  }
  showRound();
}

// ===== GAME: MATCH =====
function renderMatch(lv, body){
  let selA = null, selB = null;
  const matched = {};
  let matchCount = 0;
  const pairs = lv.data.left.length;

  body.innerHTML = `
    <div class="game-q">${lv.data.hint || 'Pasangkan item di kiri dengan yang sesuai di kanan!'}</div>
    <div class="match-grid">
      <div class="match-col" id="matchLeft"></div>
      <div class="match-col" id="matchRight"></div>
    </div>
    <div class="feedback" id="match-fb"></div>
  `;

  const leftCol = document.getElementById('matchLeft');
  const rightCol = document.getElementById('matchRight');

  lv.data.left.forEach((l, i) => {
    const el = document.createElement('div');
    el.className = 'match-item';
    el.textContent = l;
    el.dataset.idx = i;
    el.onclick = () => handleMatchA(el, i);
    leftCol.appendChild(el);
  });

  shuffleArray([...lv.data.right]).forEach((r, i) => {
    const origIdx = lv.data.right.indexOf(r);
    const el = document.createElement('div');
    el.className = 'match-item';
    el.textContent = r;
    el.dataset.orig = origIdx;
    el.onclick = () => handleMatchB(el, origIdx);
    rightCol.appendChild(el);
  });

  function handleMatchA(el, i){
    if(el.classList.contains('matched')) return;
    document.querySelectorAll('#matchLeft .match-item').forEach(x => x.classList.remove('selected-a'));
    el.classList.add('selected-a');
    selA = i;
    tryMatch();
  }
  function handleMatchB(el, i){
    if(el.classList.contains('matched')) return;
    document.querySelectorAll('#matchRight .match-item').forEach(x => x.classList.remove('selected-b'));
    el.classList.add('selected-b');
    selB = i;
    tryMatch();
  }
  function tryMatch(){
    if(selA === null || selB === null) return;
    const correctB = lv.data.pairs[selA];
    if(selB === correctB){
      document.querySelectorAll('#matchLeft .match-item')[selA].classList.remove('selected-a');
      document.querySelectorAll('#matchLeft .match-item')[selA].classList.add('matched');
      document.querySelectorAll('#matchRight .match-item').forEach(x => {
        if(parseInt(x.dataset.orig) === selB){ x.classList.remove('selected-b'); x.classList.add('matched'); }
      });
      matchCount++;
      if(matchCount === pairs) setTimeout(() => finishGame(lv, pairs, pairs, body), 600);
    } else {
      document.querySelectorAll('#matchLeft .match-item').forEach(x => x.classList.remove('selected-a'));
      document.querySelectorAll('#matchRight .match-item').forEach(x => x.classList.remove('selected-b'));
      const fb = document.getElementById('match-fb');
      fb.className = 'feedback err';
      fb.textContent = '❌ Belum tepat, coba lagi!';
      setTimeout(() => { if(fb) fb.className = 'feedback'; }, 1000);
    }
    selA = null; selB = null;
  }
}

// ===== GAME: MAZE =====
function renderMaze(lv, body){
  const G = lv.data.grid;
  const walls = lv.data.walls.map(([r,c]) => `${r},${c}`);
  let pos = [...lv.data.start];
  let seq = [];

  function render(){
    body.innerHTML = `
      <div class="game-q">${lv.data.hint}</div>
      <div class="grid-game">
        <div>
          <div class="grid-board" id="mazeBoard" style="grid-template-columns:repeat(${G},52px)"></div>
        </div>
        <div class="grid-controls">
          <div class="dir-pad">
            <div></div>
            <button class="dir-btn" onclick="addDir('⬆')">⬆</button>
            <div></div>
            <button class="dir-btn" onclick="addDir('⬅')">⬅</button>
            <div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1rem">🤖</div>
            <button class="dir-btn" onclick="addDir('➡')">➡</button>
            <div></div>
            <button class="dir-btn" onclick="addDir('⬇')">⬇</button>
            <div></div>
          </div>
          <div style="margin-top:10px;font-size:.78rem;color:var(--sub);">Program (${seq.length}/${lv.data.maxSteps}):</div>
          <div class="code-seq" id="codeSeq"></div>
          <div class="btn-row">
            <button class="btn-primary" onclick="runMaze()">▶ Jalankan!</button>
            <button class="btn-secondary" onclick="clearMaze()">🗑 Hapus</button>
          </div>
          <div class="feedback" id="maze-fb"></div>
        </div>
      </div>
    `;
    renderBoard();
    renderSeq();
  }

  function renderBoard(){
    const board = document.getElementById('mazeBoard');
    if(!board) return;
    board.innerHTML = '';
    for(let r=0; r<G; r++){
      for(let c=0; c<G; c++){
        const cell = document.createElement('div');
        const key = `${r},${c}`;
        const isKodi = r===pos[0] && c===pos[1];
        const isGoal = r===lv.data.goal[0] && c===lv.data.goal[1];
        const isWall = walls.includes(key);
        const isStart = r===lv.data.start[0] && c===lv.data.start[1];
        cell.className = 'grid-cell ' + (isWall?'cell-wall':isKodi?'cell-kodi':isGoal?'cell-goal':isStart?'cell-start':'cell-empty');
        cell.textContent = isKodi?'🤖':isGoal?'⭐':isWall?'🧱':'';
        board.appendChild(cell);
      }
    }
  }

  function renderSeq(){
    const el = document.getElementById('codeSeq');
    if(!el) return;
    el.innerHTML = '';
    seq.forEach((d,i) => {
      const b = document.createElement('span');
      b.className = 'code-block';
      b.style.background = d==='⬆'?'#2EC486':d==='⬇'?'#FF6B6B':d==='⬅'?'#FF6B35':'#4DABF7';
      b.textContent = d;
      b.title = 'Klik untuk hapus';
      b.onclick = () => { seq.splice(i,1); renderSeq(); };
      el.appendChild(b);
    });
  }

  window.addDir = (d) => {
    if(seq.length >= lv.data.maxSteps){ showToast('⚠ Langkah penuh! Hapus dulu.',''); return; }
    seq.push(d); renderSeq();
  };

  window.clearMaze = () => { seq = []; pos=[...lv.data.start]; renderSeq(); renderBoard(); };

  window.runMaze = () => {
    pos = [...lv.data.start];
    let step = 0;
    const fb = document.getElementById('maze-fb');
    if(fb){ fb.className='feedback'; }

    function tick(){
      if(step >= seq.length){
        const atGoal = pos[0]===lv.data.goal[0] && pos[1]===lv.data.goal[1];
        if(atGoal){ setTimeout(()=>finishGame(lv,1,1,body),400); }
        else {
          if(fb){ fb.className='feedback err'; fb.textContent='❌ Kodi belum sampai ke bintang. Coba tambah instruksi!'; }
        }
        return;
      }
      const d = seq[step++];
      let nr=pos[0], nc=pos[1];
      if(d==='⬆') nr--;
      else if(d==='⬇') nr++;
      else if(d==='⬅') nc--;
      else if(d==='➡') nc++;
      if(nr<0||nr>=G||nc<0||nc>=G||walls.includes(`${nr},${nc}`)){
        if(fb){ fb.className='feedback err'; fb.textContent=`❌ Kodi menabrak! Perintah ke-${step} salah arah.`; }
        return;
      }
      pos=[nr,nc];
      renderBoard();
      setTimeout(tick,350);
    }
    tick();
  };

  render();
}

// ===== GAME: CAPSTONE (multi-stage MC) =====
function renderCapstone(lv, body){
  const stages = lv.data.stages;
  let ci = 0, correct = 0;

  function showStage(){
    const r = stages[ci];
    body.innerHTML = `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;">
        ${stages.map((_,i)=>`<div style="width:32px;height:6px;border-radius:3px;background:${i<ci?'var(--green)':i===ci?'var(--yellow)':'rgba(255,255,255,.15)'}"></div>`).join('')}
      </div>
      <div class="game-score-row">
        <div class="score-chip">🏅 Tahap ${ci+1}/${stages.length}</div>
        <div class="score-chip">✅ Benar: ${correct}</div>
      </div>
      <div class="game-q" style="white-space:pre-wrap">${r.q}</div>
      <div class="mc-options" id="cap-opts"></div>
      <div class="feedback" id="cap-fb"></div>
    `;
    const opts = document.getElementById('cap-opts');
    r.opts.forEach((o,i) => {
      const btn = document.createElement('div');
      btn.className = 'mc-opt';
      btn.textContent = o;
      btn.onclick = () => {
        opts.querySelectorAll('.mc-opt').forEach(b=>b.classList.add('disabled'));
        if(i===r.ans){ btn.classList.add('correct'); correct++; }
        else { btn.classList.add('wrong'); opts.querySelectorAll('.mc-opt')[r.ans].classList.add('correct'); }
        const fb = document.getElementById('cap-fb');
        fb.className = 'feedback '+(i===r.ans?'ok':'err');
        fb.textContent = (i===r.ans?'✅ ':'❌ ')+r.explain;
        setTimeout(()=>{ ci++; if(ci<stages.length) showStage(); else finishGame(lv,correct,stages.length,body); },2000);
      };
      opts.appendChild(btn);
    });
  }
  showStage();
}

// ===== FINISH GAME =====
function finishGame(lv, score, total, body){
  const passed = score >= Math.ceil(total * 0.6);
  if(passed && !progress[lv.id]){
    progress[lv.id] = true;
    totalXP += lv.xp;
    streak = Math.min(streak + 1, 999);
    saveProgress();
  }

  if(passed){
    document.getElementById('gameModal').classList.remove('open');
    showWin(lv.title, lv.xp, passed);
    renderMap();
  } else {
    body.innerHTML += `
      <div style="margin-top:20px;padding:16px;background:rgba(255,77,139,.1);border:2px solid rgba(255,77,139,.3);border-radius:14px;">
        <div style="font-family:'Fredoka One',cursive;color:var(--red);margin-bottom:8px;">😅 Hampir! Skor: ${score}/${total}</div>
        <div style="font-size:.88rem;color:var(--sub);margin-bottom:14px;">Butuh minimal 60% untuk lulus. Coba lagi ya!</div>
        <button class="btn-primary" onclick="openLevel(winPending.lv, winPending.w)">🔄 Coba Lagi</button>
      </div>
    `;
  }
}

// ===== WIN =====
function showWin(title, xp, passed){
  if(!passed) return;
  document.getElementById('winTitle').textContent = title + ' — Selesai!';
  document.getElementById('winXP').textContent = `+${xp} XP 🎉`;
  spawnConfetti();
  document.getElementById('winOverlay').classList.add('open');
}
function closeWin(){
  document.getElementById('winOverlay').classList.remove('open');
  document.getElementById('confettiWrap').innerHTML = '';
}

window.nextLevel = () => {
  if(!winPending) return;
  const {lv, w} = winPending;
  // Find next level
  let found = false;
  for(const world of WORLDS){
    for(const level of world.levels){
      if(found && !progress[level.id]){
        openLevel(level, world);
        return;
      }
      if(level.id === lv.id) found = true;
    }
  }
  showToast('🎉 Kamu sudah menyelesaikan semua level yang tersedia!','');
};

function spawnConfetti(){
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#FFD93D','#2EC486','#9B5DE5','#FF4D8B','#4DABF7','#FF6B35'];
  for(let i=0;i<60;i++){
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100 + 'vw';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random()*1.5 + 's';
    p.style.animationDuration = (1.5 + Math.random()*1.5) + 's';
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    wrap.appendChild(p);
  }
}

// ===== TOAST =====
function showToast(msg, type){
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// ===== HELPERS =====
function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// ===== INIT =====
renderMap();
</script>
