<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>KODAI – Masuk / Daftar</title>
<link rel="stylesheet" href="css/main.css">
<style>
.login-page{min-height:calc(100vh - 68px);background:linear-gradient(135deg,#1A1A2E,#9B5DE5,#FF4D8B);display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.login-card{background:white;border-radius:28px;max-width:440px;width:100%;padding:36px;box-shadow:0 30px 60px rgba(0,0,0,.3);animation:modalIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes modalIn{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.login-logo{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#9B5DE5;text-align:center;margin-bottom:24px;}
.tab-switcher{display:grid;grid-template-columns:1fr 1fr;background:#f0f0f0;border-radius:12px;padding:4px;margin-bottom:28px;}
.tab-btn{padding:12px;border:none;border-radius:10px;background:transparent;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;color:#888;transition:all .2s;}
.tab-btn.active{background:white;color:#9B5DE5;box-shadow:0 2px 8px rgba(0,0,0,.12);}
.form-group{margin-bottom:18px;}
.form-label{font-size:.85rem;font-weight:800;color:#1A1A2E;display:block;margin-bottom:6px;}
.form-input{width:100%;padding:12px 16px;border:3px solid #eee;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:600;transition:border-color .2s;outline:none;}
.form-input:focus{border-color:#9B5DE5;}
.form-input.error{border-color:#FF4444;}
.form-error{font-size:.8rem;color:#FF4444;font-weight:700;margin-top:4px;display:none;}
.role-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.role-btn{padding:12px;border:3px solid #eee;border-radius:12px;background:white;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;transition:all .2s;text-align:center;}
.role-btn.selected{border-color:#9B5DE5;background:#f0e8ff;color:#9B5DE5;}
.btn-submit{width:100%;padding:14px;background:linear-gradient(135deg,#9B5DE5,#FF4D8B);border:none;border-radius:14px;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 6px 0 #6a3fa0;transition:all .15s;margin-top:4px;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 0 #6a3fa0;}
.btn-google{width:100%;padding:13px;background:white;border:3px solid #ddd;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-top:12px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;color:#1A1A2E;}
.btn-google:hover{border-color:#aaa;background:#f8f8f8;}
.divider{text-align:center;color:#aaa;font-weight:700;font-size:.85rem;margin:16px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:#eee;}
.divider::before{left:0;}.divider::after{right:0;}
</style>
</head>
<body>

<div id="toast-container"></div>
<nav>
  <a class="nav-logo" href="index.html">🌿 KODAI</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">🏠 Beranda</a>
    <a class="nav-link" href="materi.html">📚 Materi</a>
    <a class="nav-link" href="playground.html">🎮 Playground</a>
  </div>
  <div class="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a class="nav-link" href="index.html">🏠 Beranda</a><a class="nav-link" href="materi.html">📚 Materi</a>
</div>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">🌿 KODAI</div>
    <div class="tab-switcher">
      <button class="tab-btn active" id="tab-masuk" onclick="switchTab('masuk')">Masuk</button>
      <button class="tab-btn" id="tab-daftar" onclick="switchTab('daftar')">Daftar</button>
    </div>
    <div id="form-masuk">
      <div class="form-group"><label class="form-label">📧 Email</label><input class="form-input" id="login-email" type="email" placeholder="nama@email.com"><div class="form-error" id="err-login-email">Email tidak boleh kosong!</div></div>
      <div class="form-group"><label class="form-label">🔑 Password</label><input class="form-input" id="login-pass" type="password" placeholder="Masukkan password"><div class="form-error" id="err-login-pass">Password tidak boleh kosong!</div></div>
      <div class="form-group">
        <label class="form-label">🎭 Masuk sebagai</label>
        <div class="role-selector">
          <button class="role-btn selected" id="role-siswa" onclick="selectRole('siswa')">🎒 Siswa</button>
          <button class="role-btn" id="role-guru" onclick="selectRole('guru')">👨‍🏫 Guru</button>
        </div>
      </div>
      <button class="btn-submit" onclick="doLogin()">🚀 Masuk Sekarang</button>
      <div class="divider">atau</div>
      <button class="btn-google" onclick="showToast('🎉 Masuk dengan Google!','success');setTimeout(()=>location.href='index.html',800)">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Lanjutkan dengan Google
      </button>
    </div>
    <div id="form-daftar" style="display:none">
      <div class="form-group"><label class="form-label">👤 Nama Lengkap</label><input class="form-input" id="reg-name" type="text" placeholder="Nama kamu"><div class="form-error" id="err-reg-name">Nama tidak boleh kosong!</div></div>
      <div class="form-group"><label class="form-label">📧 Email</label><input class="form-input" id="reg-email" type="email" placeholder="nama@email.com"><div class="form-error" id="err-reg-email">Email tidak valid!</div></div>
      <div class="form-group"><label class="form-label">🔑 Password</label><input class="form-input" id="reg-pass" type="password" placeholder="Min. 6 karakter"><div class="form-error" id="err-reg-pass">Password minimal 6 karakter!</div></div>
      <div class="form-group">
        <label class="form-label">🎭 Daftar sebagai</label>
        <div class="role-selector">
          <button class="role-btn selected" id="reg-role-siswa" onclick="selectRegRole('siswa')">🎒 Siswa</button>
          <button class="role-btn" id="reg-role-guru" onclick="selectRegRole('guru')">👨‍🏫 Guru</button>
        </div>
      </div>
      <button class="btn-submit" onclick="doRegister()">🎉 Buat Akun Gratis!</button>
    </div>
  </div>
</div>
<script src="js/nav.js"></script>
<script>
let selectedRole='siswa', selectedRegRole='siswa';
function switchTab(tab){
  document.getElementById('form-masuk').style.display=tab==='masuk'?'block':'none';
  document.getElementById('form-daftar').style.display=tab==='daftar'?'block':'none';
  document.getElementById('tab-masuk').classList.toggle('active',tab==='masuk');
  document.getElementById('tab-daftar').classList.toggle('active',tab==='daftar');
}
function selectRole(r){selectedRole=r;document.getElementById('role-siswa').classList.toggle('selected',r==='siswa');document.getElementById('role-guru').classList.toggle('selected',r==='guru');}
function selectRegRole(r){selectedRegRole=r;document.getElementById('reg-role-siswa').classList.toggle('selected',r==='siswa');document.getElementById('reg-role-guru').classList.toggle('selected',r==='guru');}
function showErr(id,show){const el=document.getElementById(id);el.style.display=show?'block':'none';}
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value.trim();
  let v=true;
  if(!email){showErr('err-login-email',true);document.getElementById('login-email').classList.add('error');v=false;}else{showErr('err-login-email',false);document.getElementById('login-email').classList.remove('error');}
  if(!pass){showErr('err-login-pass',true);document.getElementById('login-pass').classList.add('error');v=false;}else{showErr('err-login-pass',false);document.getElementById('login-pass').classList.remove('error');}
  if(v){showToast('🎉 Selamat datang!','success');setTimeout(()=>location.href=(selectedRole==='guru'?'guru.html':'index.html'),800);}
}
function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pass=document.getElementById('reg-pass').value.trim();
  let v=true;
  if(!name){showErr('err-reg-name',true);v=false;}else showErr('err-reg-name',false);
  if(!email||!email.includes('@')){showErr('err-reg-email',true);v=false;}else showErr('err-reg-email',false);
  if(pass.length<6){showErr('err-reg-pass',true);v=false;}else showErr('err-reg-pass',false);
  if(v){showToast(`🎉 Akun berhasil dibuat! Halo, ${name}!`,'success');setTimeout(()=>location.href=(selectedRegRole==='guru'?'guru.html':'index.html'),1000);}
}
</script>
</body>
</html>
